<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Conversation</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>Voice Conversation</h1>
            <div class="controls">
                <div class="control-group">
                    <label for="language">Language</label>
                    <select id="language">
                        <option value="en" selected>English</option>
                        <option value="es">Español</option>
                    </select>
                </div>
                <div class="control-group">
                    <label for="input-mode">Input</label>
                    <select id="input-mode">
                        <option value="ptt" selected>Push to Talk</option>
                        <option value="vad">Auto (VAD)</option>
                    </select>
                </div>
                <div class="control-group">
                    <label for="voice">Voice</label>
                    <select id="voice"></select>
                </div>
                <div class="control-group">
                    <label for="stt-mode">STT</label>
                    <select id="stt-mode">
                        <option value="fast" selected>Fast</option>
                        <option value="quality">Quality</option>
                    </select>
                </div>
            </div>
        </header>

        <main id="conversation">
            <div id="messages"></div>
        </main>

        <footer>
            <div id="status-bar">
                <span id="status-text">Connecting...</span>
                <div id="vad-meter" class="hidden">
                    <div id="vad-fill"></div>
                </div>
            </div>
            <button id="mic-btn" disabled>
                <svg viewBox="0 0 24 24" width="32" height="32" fill="currentColor">
                    <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                    <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                </svg>
            </button>
        </footer>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
